services:
  - type: web
    name: clinica-citas-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10003"
      - key: CITAS_MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRINGDOC_ENABLED
        value: "true"
      - key: SPRING_CLOUD_CONFIG_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
