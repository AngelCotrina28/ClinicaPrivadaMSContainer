apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: clinica-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: clinica-auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_DEFAULT_ZONE
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: EUREKA_DEFAULT_ZONE
            - name: AUTH_DB_URL
              value: jdbc:mysql://mysql-auth:3306/clinica_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: AUTH_DB_USER
              value: clinica_auth_user
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mysql-auth-password
            - name: SYSTEM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: auth-admin-password
            - name: AUTH_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: AUTH_ADMIN_USERNAME
            - name: AUTH_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: AUTH_ADMIN_EMAIL
            - name: AUTH_ADMIN_NAME
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: AUTH_ADMIN_NAME
            - name: DEMO_DATA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: DEMO_DATA_ENABLED
            - name: AUTH_SEED_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: AUTH_SEED_ENABLED
            - name: DEMO_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: demo-user-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: jwt-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 45
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: clinica-ms
spec:
  selector:
    app: auth-service
  ports:
    - port: 8091
      targetPort: 8091
---
