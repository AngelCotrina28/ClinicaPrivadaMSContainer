services:
  mysql-auth:
    image: mysql:8.4
    container_name: clinica-mysql-auth
    environment:
      MYSQL_DATABASE: clinica_auth_db
      MYSQL_USER: clinica_auth_user
      MYSQL_PASSWORD: "${MYSQL_AUTH_PASSWORD:-ClinicaMysqlLocal123!}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_AUTH_ROOT_PASSWORD:-ClinicaMysqlRootLocal123!}"
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-caja:
    image: mysql:8.4
    container_name: clinica-mysql-caja
    environment:
      MYSQL_DATABASE: clinica_caja_db
      MYSQL_USER: clinica_caja_user
      MYSQL_PASSWORD: "${MYSQL_CAJA_PASSWORD:-ClinicaCajaMysqlLocal123!}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_CAJA_ROOT_PASSWORD:-ClinicaCajaRootLocal123!}"
    ports:
      - "3308:3306"
    volumes:
      - mysql_caja_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-atencion:
    image: postgres:16-alpine
    container_name: clinica-postgres-atencion
    environment:
      POSTGRES_DB: clinica_atencion_db
      POSTGRES_USER: clinica_atencion_user
      POSTGRES_PASSWORD: "${POSTGRES_ATENCION_PASSWORD:-ClinicaAtencionPostgresLocal123!}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_atencion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_atencion_user -d clinica_atencion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notificaciones:
    image: postgres:16-alpine
    container_name: clinica-postgres-notificaciones
    environment:
      POSTGRES_DB: clinica_notificaciones_db
      POSTGRES_USER: clinica_notificaciones_user
      POSTGRES_PASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_notificaciones_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_notificaciones_user -d clinica_notificaciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-citas:
    image: mongo:7
    container_name: clinica-mongo-citas
    environment:
      MONGO_INITDB_ROOT_USERNAME: clinica_citas_admin
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_CITAS_PASSWORD:-ClinicaMongoLocal123!}"
      MONGO_INITDB_DATABASE: clinica_citas_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_citas_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' -u clinica_citas_admin -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./Clinica-Config-Server
    image: clinica-config-server:local
    container_name: clinica-config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./Clinica-Eureka-Server
    image: clinica-eureka-server:local
    container_name: clinica-eureka-server
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./Clinica-Auth-Service
    image: clinica-auth-service:local
    container_name: clinica-auth-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      AUTH_DB_URL: "jdbc:mysql://mysql-auth:3306/clinica_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      AUTH_DB_USER: clinica_auth_user
      AUTH_DB_PASSWORD: "${MYSQL_AUTH_PASSWORD:-ClinicaMysqlLocal123!}"
      AUTH_ADMIN_PASSWORD: "${AUTH_ADMIN_PASSWORD:-ClinicaAdminLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Q2xpbmljYURlbW9TZWNyZXRMb2NhbFBhcmFEZXNhcnJvbGxvMjAyNg==}"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8091:8091"
    depends_on:
      mysql-auth:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  notificaciones-service:
    build:
      context: ./Clinica-Notificaciones-Service
    image: clinica-notificaciones-service:local
    container_name: clinica-notificaciones-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      NOTIFICACIONES_DB_URL: "jdbc:postgresql://postgres-notificaciones:5432/clinica_notificaciones_db"
      NOTIFICACIONES_DB_USER: clinica_notificaciones_user
      NOTIFICACIONES_DB_PASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Q2xpbmljYURlbW9TZWNyZXRMb2NhbFBhcmFEZXNhcnJvbGxvMjAyNg==}"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8092:8092"
    depends_on:
      postgres-notificaciones:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  citas-service:
    build:
      context: ./Clinica-Citas-Service
    image: clinica-citas-service:local
    container_name: clinica-citas-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      CITAS_MONGO_URI: "mongodb://clinica_citas_admin:${MONGO_CITAS_PASSWORD:-ClinicaMongoLocal123!}@mongo-citas:27017/clinica_citas_db?authSource=admin"
      JWT_SECRET: "${JWT_SECRET:-Q2xpbmljYURlbW9TZWNyZXRMb2NhbFBhcmFEZXNhcnJvbGxvMjAyNg==}"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8093:8093"
    depends_on:
      mongo-citas:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  atencion-medica-service:
    build:
      context: ./Clinica-Atencion-Medica-Service
    image: clinica-atencion-medica-service:local
    container_name: clinica-atencion-medica-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      ATENCION_DB_URL: "jdbc:postgresql://postgres-atencion:5432/clinica_atencion_db"
      ATENCION_DB_USER: clinica_atencion_user
      ATENCION_DB_PASSWORD: "${POSTGRES_ATENCION_PASSWORD:-ClinicaAtencionPostgresLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Q2xpbmljYURlbW9TZWNyZXRMb2NhbFBhcmFEZXNhcnJvbGxvMjAyNg==}"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8094:8094"
    depends_on:
      postgres-atencion:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  caja-facturacion-service:
    build:
      context: ./Clinica-Caja-Facturacion-Service
    image: clinica-caja-facturacion-service:local
    container_name: clinica-caja-facturacion-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      CAJA_DB_URL: "jdbc:mysql://mysql-caja:3306/clinica_caja_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      CAJA_DB_USER: clinica_caja_user
      CAJA_DB_PASSWORD: "${MYSQL_CAJA_PASSWORD:-ClinicaCajaMysqlLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Q2xpbmljYURlbW9TZWNyZXRMb2NhbFBhcmFEZXNhcnJvbGxvMjAyNg==}"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8095:8095"
    depends_on:
      mysql-caja:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8095/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway-service:
    build:
      context: ./Clinica-Gateway-Service
    image: clinica-gateway-service:local
    container_name: clinica-gateway-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      AUTH_SERVICE_URL: "http://auth-service:8091"
      NOTIFICACIONES_SERVICE_URL: "http://notificaciones-service:8092"
      CITAS_SERVICE_URL: "http://citas-service:8093"
      ATENCION_SERVICE_URL: "http://atencion-medica-service:8094"
      CAJA_SERVICE_URL: "http://caja-facturacion-service:8095"
      BACKEND_URL: "http://host.docker.internal:8080"
      CITAS_ROUTE_ENABLED: "false"
      ATENCION_ROUTE_ENABLED: "false"
      CAJA_ROUTE_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    ports:
      - "8090:8090"
    depends_on:
      auth-service:
        condition: service_healthy
      notificaciones-service:
        condition: service_healthy
      citas-service:
        condition: service_healthy
      atencion-medica-service:
        condition: service_healthy
      caja-facturacion-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_auth_data:
  mysql_caja_data:
  postgres_atencion_data:
  postgres_notificaciones_data:
  mongo_citas_data:
