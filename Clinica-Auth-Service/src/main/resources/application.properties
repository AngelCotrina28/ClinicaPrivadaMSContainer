spring.application.name=clinica-auth-service
server.address=0.0.0.0
server.port=${PORT:8091}

spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USER}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=${AUTH_DB_INITIALIZATION_FAIL_TIMEOUT:-1}

spring.jpa.hibernate.ddl-auto=${AUTH_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.jakarta.persistence.validation.mode=auto

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.seed.enabled=${AUTH_SEED_ENABLED:true}
app.seed.admin.username=${AUTH_ADMIN_USERNAME:admin}
app.seed.admin.password=${AUTH_ADMIN_PASSWORD}
app.seed.admin.email=${AUTH_ADMIN_EMAIL:admin@clinica.local}
app.seed.admin.name=${AUTH_ADMIN_NAME:Administrador General}

management.endpoints.web.exposure.include=health
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.persist-authorization=true
