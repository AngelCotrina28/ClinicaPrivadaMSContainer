services:
  postgres-notificaciones:
    image: postgres:16-alpine
    container_name: clinica-postgres-notificaciones
    environment:
      POSTGRES_DB: clinica_notificaciones_db
      POSTGRES_USER: clinica_notificaciones_user
      POSTGRES_PASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_notificaciones_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_notificaciones_user -d clinica_notificaciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver-citas:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinica-sqlserver-citas
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-ClinicaSqlServerLocal123!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_citas_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_notificaciones_data:
  sqlserver_citas_data:
