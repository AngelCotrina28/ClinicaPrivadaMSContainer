apiVersion: batch/v1
kind: Job
metadata:
  name: seed-mongo-citas
  namespace: clinica-ms
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: seed-mongo-citas
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: mongo:7
          env:
            - name: MONGO_CITAS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mongo-citas-password
          command: ["/bin/sh", "-c"]
          args:
            - >-
              mongosh --quiet --host mongo-citas --username clinica_citas_admin
              --password "$MONGO_CITAS_PASSWORD" --authenticationDatabase admin
              /seed/schema.mongodb.js &&
              mongosh --quiet --host mongo-citas --username clinica_citas_admin
              --password "$MONGO_CITAS_PASSWORD" --authenticationDatabase admin
              /seed/data.mongodb.js
          volumeMounts:
            - name: seed-files
              mountPath: /seed
              readOnly: true
      volumes:
        - name: seed-files
          configMap:
            name: seed-mongo-citas
