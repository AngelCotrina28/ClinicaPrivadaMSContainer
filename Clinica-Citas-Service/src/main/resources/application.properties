spring.application.name=clinica-citas-service
server.address=0.0.0.0
server.port=${PORT:8093}

spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.mongodb.uri=${CITAS_MONGO_URI}

jwt.secret=${JWT_SECRET}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

management.endpoints.web.exposure.include=health
management.health.mongodb.enabled=${MONGODB_HEALTH_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.persist-authorization=true
