spring.application.name=clinica-citas-service
server.address=0.0.0.0
server.port=${PORT:8093}

spring.datasource.url=${CITAS_DB_URL}
spring.datasource.username=${CITAS_DB_USER}
spring.datasource.password=${CITAS_DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=${CITAS_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.jakarta.persistence.validation.mode=auto

jwt.secret=${JWT_SECRET}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

management.endpoints.web.exposure.include=health
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.persist-authorization=true
