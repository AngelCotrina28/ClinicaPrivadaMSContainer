apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-citas
  namespace: clinica-ms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongo-citas
  template:
    metadata:
      labels:
        app: mongo-citas
    spec:
      containers:
        - name: mongo-citas
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: clinica_citas_admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mongo-citas-password
            - name: MONGO_INITDB_DATABASE
              value: clinica_citas_db
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --quiet --eval 'db.adminCommand("ping").ok' -u clinica_citas_admin -p "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin | grep 1
            initialDelaySeconds: 20
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 20
          volumeMounts:
            - name: mongo-citas-data
              mountPath: /data/db
      volumes:
        - name: mongo-citas-data
          persistentVolumeClaim:
            claimName: mongo-citas-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-citas
  namespace: clinica-ms
spec:
  selector:
    app: mongo-citas
  ports:
    - port: 27017
      targetPort: 27017
