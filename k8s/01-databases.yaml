  namespace: clinica-ms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-auth
  namespace: clinica-ms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mysql-auth
  template:
    metadata:
      labels:
        app: mysql-auth
    spec:
      containers:
        - name: mysql-auth
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: clinica_auth_db
            - name: MYSQL_USER
              value: clinica_auth_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mysql-auth-password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mysql-auth-root-password
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: mysql-auth-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-auth-data
          persistentVolumeClaim:
            claimName: mysql-auth-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-auth
  namespace: clinica-ms
spec:
  selector:
    app: mysql-auth
  ports:
    - port: 3306
      targetPort: 3306
---
