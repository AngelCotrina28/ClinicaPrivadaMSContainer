apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: clinica-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: clinica-gateway-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_DEFAULT_ZONE
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: EUREKA_DEFAULT_ZONE
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8091
            - name: NOTIFICACIONES_SERVICE_URL
              value: http://notificaciones-service:8092
            - name: CITAS_SERVICE_URL
              value: http://citas-service:8093
            - name: ATENCION_SERVICE_URL
              value: http://atencion-medica-service:8094
            - name: CAJA_SERVICE_URL
              value: http://caja-facturacion-service:8095
            - name: BACKEND_URL
              value: http://host.docker.internal:8080
            - name: CITAS_ROUTE_ENABLED
              value: "false"
            - name: ATENCION_ROUTE_ENABLED
              value: "false"
            - name: CAJA_ROUTE_ENABLED
              value: "false"
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 45
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: clinica-ms
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8090
      targetPort: 8090
