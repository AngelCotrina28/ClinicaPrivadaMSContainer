services:
  - type: web
    name: clinica-atencion-medica-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10004"
      - key: ATENCION_DB_URL
        sync: false
      - key: ATENCION_DB_USER
        sync: false
      - key: ATENCION_DB_PASSWORD
        sync: false
      - key: ATENCION_DDL_AUTO
        value: "update"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRINGDOC_ENABLED
        value: "true"
