apiVersion: batch/v1
kind: Job
metadata:
  name: seed-postgres-atencion
  namespace: clinica-ms
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: seed-postgres-atencion
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres-atencion
            - name: PGDATABASE
              value: clinica_atencion_db
            - name: PGUSER
              value: clinica_atencion_user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: postgres-atencion-password
          command: ["/bin/sh", "-c"]
          args:
            - >-
              psql -v ON_ERROR_STOP=1 -f /seed/schema.sql &&
              psql -v ON_ERROR_STOP=1 -f /seed/data.sql
          volumeMounts:
            - name: seed-files
              mountPath: /seed
              readOnly: true
      volumes:
        - name: seed-files
          configMap:
            name: seed-postgres-atencion
---
