apiVersion: batch/v1
kind: Job
metadata:
  name: seed-mysql-auth
  namespace: clinica-ms
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: seed-mysql-auth
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: mysql:8.4
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mysql-auth-root-password
          command: ["/bin/sh", "-c"]
          args:
            - >-
              mysql --protocol=TCP -h mysql-auth -uroot < /seed/schema.sql &&
              mysql --protocol=TCP -h mysql-auth -uroot < /seed/data.sql
          volumeMounts:
            - name: seed-files
              mountPath: /seed
              readOnly: true
      volumes:
        - name: seed-files
          configMap:
            name: seed-mysql-auth
---
