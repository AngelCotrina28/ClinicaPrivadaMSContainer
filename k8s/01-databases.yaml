apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-atencion
  namespace: clinica-ms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-atencion
  template:
    metadata:
      labels:
        app: postgres-atencion
    spec:
      containers:
        - name: postgres-atencion
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: clinica_atencion_db
            - name: POSTGRES_USER
              value: clinica_atencion_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: postgres-atencion-password
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U clinica_atencion_user -d clinica_atencion_db
            initialDelaySeconds: 15
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 20
          volumeMounts:
            - name: postgres-atencion-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-atencion-data
          persistentVolumeClaim:
            claimName: postgres-atencion-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-atencion
  namespace: clinica-ms
spec:
  selector:
    app: postgres-atencion
  ports:
    - port: 5432
      targetPort: 5432
---
