services:
  - type: web
    name: clinica-auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10001"
      - key: AUTH_DB_URL
        sync: false
      - key: AUTH_DB_USER
        sync: false
      - key: AUTH_DB_PASSWORD
        sync: false
      - key: AUTH_DDL_AUTO
        value: "update"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SEED_ENABLED
        value: "true"
      - key: AUTH_ADMIN_USERNAME
        value: "admin"
      - key: SYSTEM_ADMIN_PASSWORD
        value: "Admin123"
      - key: AUTH_ADMIN_EMAIL
        value: "admin@clinica.local"
      - key: AUTH_ADMIN_NAME
        value: "Administrador General"
      - key: SPRINGDOC_ENABLED
        value: "true"
