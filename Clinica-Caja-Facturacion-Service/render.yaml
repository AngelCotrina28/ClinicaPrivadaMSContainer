services:
  - type: web
    name: clinica-caja-facturacion-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10005"
      - key: CAJA_DB_URL
        sync: false
      - key: CAJA_DB_USER
        sync: false
      - key: CAJA_DB_PASSWORD
        sync: false
      - key: CAJA_DDL_AUTO
        value: "update"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRINGDOC_ENABLED
        value: "true"
      - key: SPRING_CLOUD_CONFIG_ENABLED
        value: "false"
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
