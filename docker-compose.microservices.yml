services:
  mysql-auth:
    image: mysql:8.4
    container_name: clinica-mysql-auth
    environment:
      MYSQL_DATABASE: clinica_auth_db
      MYSQL_USER: clinica_auth_user
      MYSQL_PASSWORD: "${MYSQL_AUTH_PASSWORD:-ClinicaMysqlLocal123!}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_AUTH_ROOT_PASSWORD:-ClinicaMysqlRootLocal123!}"
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed-mysql-auth:
    image: mysql:8.4
    container_name: clinica-seed-mysql-auth
    restart: "no"
    environment:
      MYSQL_PWD: "${MYSQL_AUTH_ROOT_PASSWORD:-ClinicaMysqlRootLocal123!}"
    volumes:
      - ./database/mysql/auth/schema.sql:/seed/01-schema.sql:ro
      - ./database/mysql/auth/data.sql:/seed/02-data.sql:ro
    depends_on:
      mysql-auth:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mysql --protocol=TCP -h mysql-auth -uroot < /seed/01-schema.sql &&
        mysql --protocol=TCP -h mysql-auth -uroot < /seed/02-data.sql

  mysql-caja:
    image: mysql:8.4
    container_name: clinica-mysql-caja
    environment:
      MYSQL_DATABASE: clinica_caja_db
      MYSQL_USER: clinica_caja_user
      MYSQL_PASSWORD: "${MYSQL_CAJA_PASSWORD:-ClinicaCajaMysqlLocal123!}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_CAJA_ROOT_PASSWORD:-ClinicaCajaRootLocal123!}"
    ports:
      - "3308:3306"
    volumes:
      - mysql_caja_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed-mysql-caja:
    image: mysql:8.4
    container_name: clinica-seed-mysql-caja
    restart: "no"
    environment:
      MYSQL_PWD: "${MYSQL_CAJA_ROOT_PASSWORD:-ClinicaCajaRootLocal123!}"
    volumes:
      - ./database/mysql/caja/schema.sql:/seed/01-schema.sql:ro
      - ./database/mysql/caja/data.sql:/seed/02-data.sql:ro
    depends_on:
      mysql-caja:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mysql --protocol=TCP -h mysql-caja -uroot < /seed/01-schema.sql &&
        mysql --protocol=TCP -h mysql-caja -uroot < /seed/02-data.sql

  postgres-atencion:
    image: postgres:16-alpine
    container_name: clinica-postgres-atencion
    environment:
      POSTGRES_DB: clinica_atencion_db
      POSTGRES_USER: clinica_atencion_user
      POSTGRES_PASSWORD: "${POSTGRES_ATENCION_PASSWORD:-ClinicaAtencionPostgresLocal123!}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_atencion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_atencion_user -d clinica_atencion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  seed-postgres-atencion:
    image: postgres:16-alpine
    container_name: clinica-seed-postgres-atencion
    restart: "no"
    environment:
      PGHOST: postgres-atencion
      PGDATABASE: clinica_atencion_db
      PGUSER: clinica_atencion_user
      PGPASSWORD: "${POSTGRES_ATENCION_PASSWORD:-ClinicaAtencionPostgresLocal123!}"
    volumes:
      - ./database/postgresql/atencion/schema.sql:/seed/01-schema.sql:ro
      - ./database/postgresql/atencion/data.sql:/seed/02-data.sql:ro
    depends_on:
      postgres-atencion:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        psql -v ON_ERROR_STOP=1 -f /seed/01-schema.sql &&
        psql -v ON_ERROR_STOP=1 -f /seed/02-data.sql

  postgres-notificaciones:
    image: postgres:16-alpine
    container_name: clinica-postgres-notificaciones
    environment:
      POSTGRES_DB: clinica_notificaciones_db
      POSTGRES_USER: clinica_notificaciones_user
      POSTGRES_PASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
    ports:
      - "5434:5432"
    volumes:
      - postgres_notificaciones_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_notificaciones_user -d clinica_notificaciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  seed-postgres-notificaciones:
    image: postgres:16-alpine
    container_name: clinica-seed-postgres-notificaciones
    restart: "no"
    environment:
      PGHOST: postgres-notificaciones
      PGDATABASE: clinica_notificaciones_db
      PGUSER: clinica_notificaciones_user
      PGPASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
    volumes:
      - ./database/postgresql/notificaciones/schema.sql:/seed/01-schema.sql:ro
      - ./database/postgresql/notificaciones/data.sql:/seed/02-data.sql:ro
    depends_on:
      postgres-notificaciones:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        psql -v ON_ERROR_STOP=1 -f /seed/01-schema.sql &&
        psql -v ON_ERROR_STOP=1 -f /seed/02-data.sql

  mongo-citas:
    image: mongo:7
    container_name: clinica-mongo-citas
    environment:
      MONGO_INITDB_ROOT_USERNAME: clinica_citas_admin
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_CITAS_PASSWORD:-ClinicaMongoLocal123!}"
      MONGO_INITDB_DATABASE: clinica_citas_db
    ports:
      - "27018:27017"
    volumes:
      - mongo_citas_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' -u clinica_citas_admin -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seed-mongo-citas:
    image: mongo:7
    container_name: clinica-seed-mongo-citas
    restart: "no"
    environment:
      MONGO_CITAS_USER: clinica_citas_admin
      MONGO_CITAS_PASSWORD: "${MONGO_CITAS_PASSWORD:-ClinicaMongoLocal123!}"
    volumes:
      - ./database/mongodb/citas/schema.mongodb.js:/seed/01-schema.mongodb.js:ro
      - ./database/mongodb/citas/data.mongodb.js:/seed/02-data.mongodb.js:ro
    depends_on:
      mongo-citas:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mongosh --quiet --host mongo-citas --username "$${MONGO_CITAS_USER}"
        --password "$${MONGO_CITAS_PASSWORD}" --authenticationDatabase admin
        /seed/01-schema.mongodb.js &&
        mongosh --quiet --host mongo-citas --username "$${MONGO_CITAS_USER}"
        --password "$${MONGO_CITAS_PASSWORD}" --authenticationDatabase admin
        /seed/02-data.mongodb.js

  config-server:
    build:
      context: ./Clinica-Config-Server
    image: clinica-config-server:local
    container_name: clinica-config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10

  eureka-server:
    build:
      context: ./Clinica-Eureka-Server
    image: clinica-eureka-server:local
    container_name: clinica-eureka-server
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10

  auth-service:
    build:
      context: ./Clinica-Auth-Service
    image: clinica-auth-service:local
    container_name: clinica-auth-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      AUTH_DB_URL: "jdbc:mysql://mysql-auth:3306/clinica_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      AUTH_DB_USER: clinica_auth_user
      AUTH_DB_PASSWORD: "${MYSQL_AUTH_PASSWORD:-ClinicaMysqlLocal123!}"
      SYSTEM_ADMIN_PASSWORD: "${SYSTEM_ADMIN_PASSWORD:-ClinicaAdminLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Y2xpbmljYS1sb2NhbC1kZXYtb25seS0yMDI2LWNoYW5nZS1tZS0xMjM0NTY3ODkw}"
      AUTH_ADMIN_USERNAME: "${AUTH_ADMIN_USERNAME:-admin}"
      AUTH_ADMIN_EMAIL: "${AUTH_ADMIN_EMAIL:-admin@clinica.local}"
      AUTH_ADMIN_NAME: "${AUTH_ADMIN_NAME:-Administrador General}"
      AUTH_SEED_ENABLED: "${AUTH_SEED_ENABLED:-true}"
      DEMO_DATA_ENABLED: "${DEMO_DATA_ENABLED:-true}"
      DEMO_USER_PASSWORD: "${DEMO_USER_PASSWORD:-ClinicaDemoLocal123!}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
    ports:
      - "8091:8091"
    depends_on:
      seed-mysql-auth:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10

  notificaciones-service:
    build:
      context: ./Clinica-Notificaciones-Service
    image: clinica-notificaciones-service:local
    container_name: clinica-notificaciones-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      NOTIFICACIONES_DB_URL: "jdbc:postgresql://postgres-notificaciones:5432/clinica_notificaciones_db"
      NOTIFICACIONES_DB_USER: clinica_notificaciones_user
      NOTIFICACIONES_DB_PASSWORD: "${POSTGRES_NOTIFICACIONES_PASSWORD:-ClinicaPostgresLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Y2xpbmljYS1sb2NhbC1kZXYtb25seS0yMDI2LWNoYW5nZS1tZS0xMjM0NTY3ODkw}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
    ports:
      - "8092:8092"
    depends_on:
      seed-postgres-notificaciones:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8092/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10

  citas-service:
    build:
      context: ./Clinica-Citas-Service
    image: clinica-citas-service:local
    container_name: clinica-citas-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      CITAS_MONGO_URI: "mongodb://clinica_citas_admin:${MONGO_CITAS_PASSWORD:-ClinicaMongoLocal123!}@mongo-citas:27017/clinica_citas_db?authSource=admin"
      MONGODB_HEALTH_ENABLED: "${MONGODB_HEALTH_ENABLED:-true}"
      MONGO_LEGACY_TIMEZONE: "${MONGO_LEGACY_TIMEZONE:-UTC}"
      JWT_SECRET: "${JWT_SECRET:-Y2xpbmljYS1sb2NhbC1kZXYtb25seS0yMDI2LWNoYW5nZS1tZS0xMjM0NTY3ODkw}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
    ports:
      - "8093:8093"
    depends_on:
      seed-mongo-citas:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10

  atencion-medica-service:
    build:
      context: ./Clinica-Atencion-Medica-Service
    image: clinica-atencion-medica-service:local
    container_name: clinica-atencion-medica-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      ATENCION_DB_URL: "jdbc:postgresql://postgres-atencion:5432/clinica_atencion_db"
      ATENCION_DB_USER: clinica_atencion_user
      ATENCION_DB_PASSWORD: "${POSTGRES_ATENCION_PASSWORD:-ClinicaAtencionPostgresLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Y2xpbmljYS1sb2NhbC1kZXYtb25seS0yMDI2LWNoYW5nZS1tZS0xMjM0NTY3ODkw}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
    ports:
      - "8094:8094"
    depends_on:
      seed-postgres-atencion:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10

  caja-facturacion-service:
    build:
      context: ./Clinica-Caja-Facturacion-Service
    image: clinica-caja-facturacion-service:local
    container_name: clinica-caja-facturacion-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      CAJA_DB_URL: "jdbc:mysql://mysql-caja:3306/clinica_caja_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      CAJA_DB_USER: clinica_caja_user
      CAJA_DB_PASSWORD: "${MYSQL_CAJA_PASSWORD:-ClinicaCajaMysqlLocal123!}"
      JWT_SECRET: "${JWT_SECRET:-Y2xpbmljYS1sb2NhbC1kZXYtb25seS0yMDI2LWNoYW5nZS1tZS0xMjM0NTY3ODkw}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
    ports:
      - "8095:8095"
    depends_on:
      seed-mysql-caja:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8095/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10

  gateway-service:
    build:
      context: ./Clinica-Gateway-Service
    image: clinica-gateway-service:local
    container_name: clinica-gateway-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka/"
      AUTH_SERVICE_URL: "http://auth-service:8091"
      NOTIFICACIONES_SERVICE_URL: "http://notificaciones-service:8092"
      CITAS_SERVICE_URL: "http://citas-service:8093"
      ATENCION_SERVICE_URL: "http://atencion-medica-service:8094"
      CAJA_SERVICE_URL: "http://caja-facturacion-service:8095"
      BACKEND_URL: "${BACKEND_URL:-http://host.docker.internal:8080}"
      CITAS_LEGACY_ROUTE_ENABLED: "${CITAS_LEGACY_ROUTE_ENABLED:-false}"
      ATENCION_LEGACY_ROUTE_ENABLED: "${ATENCION_LEGACY_ROUTE_ENABLED:-false}"
      CAJA_LEGACY_ROUTE_ENABLED: "${CAJA_LEGACY_ROUTE_ENABLED:-false}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:4200}"
      GATEWAY_CONNECT_TIMEOUT_SECONDS: "${GATEWAY_CONNECT_TIMEOUT_SECONDS:-30}"
      GATEWAY_REQUEST_TIMEOUT_SECONDS: "${GATEWAY_REQUEST_TIMEOUT_SECONDS:-120}"
    ports:
      - "8090:8090"
    depends_on:
      auth-service:
        condition: service_healthy
      notificaciones-service:
        condition: service_healthy
      citas-service:
        condition: service_healthy
      atencion-medica-service:
        condition: service_healthy
      caja-facturacion-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10

volumes:
  mysql_auth_data:
  mysql_caja_data:
  postgres_atencion_data:
  postgres_notificaciones_data:
  mongo_citas_data:
