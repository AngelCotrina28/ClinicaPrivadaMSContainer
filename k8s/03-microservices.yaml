apiVersion: apps/v1
kind: Deployment
metadata:
  name: citas-service
  namespace: clinica-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: citas-service
  template:
    metadata:
      labels:
        app: citas-service
    spec:
      containers:
        - name: citas-service
          image: clinica-citas-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8093
          env:
            - name: MONGO_CITAS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: mongo-citas-password
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_DEFAULT_ZONE
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: EUREKA_DEFAULT_ZONE
            - name: CITAS_MONGO_URI
              value: mongodb://clinica_citas_admin:$(MONGO_CITAS_PASSWORD)@mongo-citas:27017/clinica_citas_db?authSource=admin
            - name: MONGODB_HEALTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: MONGODB_HEALTH_ENABLED
            - name: MONGO_LEGACY_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: MONGO_LEGACY_TIMEZONE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clinica-ms-secrets
                  key: jwt-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: clinica-ms-shared-config
                  key: CORS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 45
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 20
---
